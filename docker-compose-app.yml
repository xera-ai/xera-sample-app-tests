services:
  backend:
    image: ghcr.io/xera-ai/xera-sample-app-backend:${TAG:-latest}
    pull_policy: always
    ports:
      - "${BACKEND_PORT:-3100}:3000"
    volumes:
      - data:/app/data
    environment:
      PORT: "3000"
      AUTO_SEED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/xera-ai/xera-sample-app-frontend:${TAG:-latest}
    pull_policy: always
    ports:
      - "${FRONTEND_PORT:-5273}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
