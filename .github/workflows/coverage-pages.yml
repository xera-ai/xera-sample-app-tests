name: xera coverage → GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.x' }
      - run: bun install --frozen-lockfile
      - name: Build graph snapshot
        run: bun run xera:graph-snapshot
      - name: Build coverage report
        run: bun run xera:coverage-prepare --no-emit-event
      - name: Render viewer with Coverage tab
        run: bun run xera:graph-render --include-coverage
      - name: Stage site
        run: |
          mkdir -p _site
          cp .xera/graph.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
